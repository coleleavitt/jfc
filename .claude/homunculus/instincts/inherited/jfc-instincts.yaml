# Jfc Test Naming

## Action

Write Rust tests as `#[cfg(test)]` modules in the source file, or as integration tests under the crate's `tests/` directory (files end in `.rs`). The `*.test.ts` pattern applies only to the `apps/design-web/` TypeScript sub-app.

## Evidence

- Rust is the primary language; tests use `#[test]` / `#[cfg(test)]` (e.g. crates/jfc-audit/tests/).
- `*.test.ts` is confined to apps/design-web/.

