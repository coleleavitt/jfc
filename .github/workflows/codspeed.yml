name: CodSpeed

permissions:
  contents: read
  id-token: write # for OpenID Connect authentication with CodSpeed

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  # Allows CodSpeed to trigger backtest performance analysis to seed baseline data.
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  benchmarks:
    name: Run benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Install system deps (openssl + dbus for notify-rust)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libdbus-1-dev libssl-dev pkg-config ripgrep
      - name: Install nightly toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: nightly
      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.8.1
      - name: Install cargo-codspeed
        uses: taiki-e/install-action@7a79fe8c3a13344501c80d99cae481c1c9085912 # v2.81.10
        with:
          tool: cargo-codspeed
      - name: Build the benchmarks
        run: cargo codspeed build -p jfc
      - name: Run the benchmarks
        uses: CodSpeedHQ/action@c145068895e045cc725ee76fcd2307624b65c3af # v4.17.5
        with:
          mode: simulation
          run: cargo codspeed run -p jfc
