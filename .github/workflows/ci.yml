name: CI

permissions:
  contents: read

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Install system deps (dbus for notify-rust)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libdbus-1-dev pkg-config ripgrep
      - name: Install nightly toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: nightly
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Install system deps (dbus for notify-rust)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libdbus-1-dev pkg-config ripgrep
      - name: Install nightly toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: nightly
          components: clippy
      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.8.1
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Install system deps (dbus for notify-rust)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libdbus-1-dev pkg-config ripgrep
      - name: Install nightly toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: nightly
      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.8.1
      - name: Build
        run: cargo build --workspace
      - name: Test
        run: cargo test --workspace

  public-build:
    name: public build (no sensitive features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Install system deps (dbus for notify-rust)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libdbus-1-dev pkg-config ripgrep
      - name: Install nightly toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: nightly
      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.8.1
      - name: Build without anthropic-oauth-sensitive
        run: cargo build -p jfc --bin jfc --no-default-features --features hooks,permission-automation

  integration:
    name: integration (CLI/daemon e2e)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Install system deps (dbus for notify-rust)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libdbus-1-dev pkg-config ripgrep
      - name: Install nightly toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: nightly
      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.8.1
      - name: Configure git (e2e tests shell out to git)
        run: |
          git config --global user.email ci@example.com
          git config --global user.name ci
      # Real end-to-end coverage: drive the compiled `jfc` binary against
      # temp repos (changes_cli_e2e) and exercise the cross-process plan
      # store (plan_e2e). Hermetic — no network, temp dirs only.
      - name: CLI + cross-session integration tests
        run: cargo test -p jfc --test changes_cli_e2e --test plan_e2e

  perf:
    name: performance baseline gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Install system deps (dbus for notify-rust)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libdbus-1-dev pkg-config ripgrep
      - name: Install nightly toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: nightly
      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.8.1
      # Order-of-magnitude regression gate on the hot persistence paths
      # (change-set + ledger stores). Generous slack so it only trips on a
      # real regression, not CI jitter; bump JFC_PERF_SLACK to relax further
      # on a slow shared runner.
      - name: Performance baseline
        env:
          JFC_PERF_SLACK: "3"
        run: cargo test -p jfc-changeset --test perf_baseline
